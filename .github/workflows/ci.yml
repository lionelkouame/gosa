name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Lint, Stan, Test, Behat
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Start containers
        run: docker compose up -d --wait

      - name: Install dependencies
        run: docker compose exec -T app composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Symfony health check
        run: docker compose exec -T app php bin/console about

      - name: Lint (PHP CS Fixer)
        run: docker compose exec -T app vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Static analysis (PHPStan)
        run: docker compose exec -T app vendor/bin/phpstan analyse --no-progress

      - name: Unit & Integration tests (PHPUnit)
        run: docker compose exec -T app vendor/bin/phpunit --no-coverage

      - name: Acceptance tests (Behat)
        run: docker compose exec -T app vendor/bin/behat --no-interaction

      - name: Stop containers
        if: always()
        run: docker compose down
