site_name: GOSA — Galaxie Open Source Application
site_description: A curated registry of open source applications
repo_url: https://github.com/lionelkouame/gosa
repo_name: lionelkouame/gosa

docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: blue
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Architecture:
    - Overview: architecture/overview.md
    - Bounded Contexts: architecture/bounded-contexts.md
    - Decisions:
      - ADR-001 — FrankenPHP + PHP 8.5: architecture/decisions/ADR-001-frankenphp-php85.md
      - ADR-002 — PHP without framework: architecture/decisions/ADR-002-php-pur-sans-framework.md
      - ADR-003 — JSON-LD and ActivityPub: architecture/decisions/ADR-003-json-ld-activitypub.md
  - Domain:
    - Glossary: domain/glossaire.md
    - Application Registry: domain/application-registry.md
  - Setup:
    - Installation: setup/installation.md
    - Development: setup/development.md
  - Stories:
    - US-001 — Dev environment: stories/US-001-setup.md
    - US-002 — Register application: stories/US-002-enregistrer-application.md
    - US-003 — Symfony integration: stories/US-003-symfony-integration.md
    - US-004 — Galaxy: stories/US-004-galaxy.md
