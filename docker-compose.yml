services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - .:/app
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SERVER_NAME: localhost
      DATABASE_URL: postgresql://gosa:gosa@db:5432/gosa
      APP_ENV: dev
      APP_DEBUG: '1'
      APP_SECRET: 'gosa-dev-secret-change-in-production'
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gosa
      POSTGRES_USER: gosa
      POSTGRES_PASSWORD: gosa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gosa -d gosa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
